<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator" role="application" aria-label="Scientific Calculator">
    <div class="display" id="display" aria-live="polite">
      <div class="display-expression" id="expression"></div>
      <div class="display-value" id="value">0</div>
    </div>

    <!-- Scientific function row (ADR-002): direct buttons + Shift for inverse functions -->
    <div class="sci-row">
      <button class="btn sci" data-action="shift" id="shiftBtn">Shift</button>
      <button class="btn sci" data-action="sci" data-fn="sin" data-shift-fn="asin" data-shift-label="asin">sin</button>
      <button class="btn sci" data-action="sci" data-fn="cos" data-shift-fn="acos" data-shift-label="acos">cos</button>
      <button class="btn sci" data-action="sci" data-fn="tan" data-shift-fn="atan" data-shift-label="atan">tan</button>
      <button class="btn sci" data-action="sci" data-fn="log" data-shift-fn="ln" data-shift-label="ln">log</button>
      <button class="btn sci" data-action="sci" data-fn="sqrt" data-shift-fn="factorial" data-shift-label="n!">&radic;</button>
      <button class="btn sci" data-action="power" data-shift-fn="tenpow" data-shift-label="10^x">x^y</button>
    </div>

    <!-- Standard pad -->
    <div class="pad">
      <button class="btn func" data-action="clear">C</button>
      <button class="btn func" data-action="sign">+/-</button>
      <button class="btn func" data-action="percent">%</button>
      <button class="btn op" data-action="operator" data-op="/">&divide;</button>

      <button class="btn digit" data-digit="7">7</button>
      <button class="btn digit" data-digit="8">8</button>
      <button class="btn digit" data-digit="9">9</button>
      <button class="btn op" data-action="operator" data-op="*">&times;</button>

      <button class="btn digit" data-digit="4">4</button>
      <button class="btn digit" data-digit="5">5</button>
      <button class="btn digit" data-digit="6">6</button>
      <button class="btn op" data-action="operator" data-op="-">&minus;</button>

      <button class="btn digit" data-digit="1">1</button>
      <button class="btn digit" data-digit="2">2</button>
      <button class="btn digit" data-digit="3">3</button>
      <button class="btn op" data-action="operator" data-op="+">+</button>

      <button class="btn digit zero" data-digit="0">0</button>
      <button class="btn digit" data-action="decimal">.</button>
      <button class="btn op equals" data-action="equals">=</button>
    </div>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
